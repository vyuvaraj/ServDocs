project_name: servdocs
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: servdocs
    main: .
    binary: servdocs
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildDate={{.Date}}

archives:
  - id: servdocs
    builds: [servdocs]
    name_template: "servdocs_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

dockers:
  - image_templates:
      - "ghcr.io/vyuvaraj/servdocs:{{.Tag}}"
      - "ghcr.io/vyuvaraj/servdocs:latest"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.title=ServDocs"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.source=https://github.com/vyuvaraj/ServDocs"

brews:
  - name: servdocs
    repository:
      owner: vyuvaraj
      name: homebrew-serv
    homepage: "https://github.com/vyuvaraj/ServDocs"
    description: "Documentation server for the ServVerse platform"
    license: "Apache-2.0"
    install: |
      bin.install "servdocs"
    test: |
      system "#{bin}/servdocs", "--version"

scoops:
  - repository:
      owner: vyuvaraj
      name: scoop-serv
    homepage: "https://github.com/vyuvaraj/ServDocs"
    description: "Documentation server for the ServVerse platform"
    license: "Apache-2.0"


nfpms:
  - id: servdocs-pkg
    package_name: servdocs
    builds: [servdocs]
    vendor: Yuvaraj
    homepage: https://github.com/vyuvaraj/ServDocs
    maintainer: Yuvaraj <vyuvaraj@github.com>
    description: Documentation server from the ServVerse platform
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/servdocs/README.md
    scripts:
      postinstall: scripts/postinstall.sh
      preremove: scripts/preremove.sh
release:
  mode: replace
